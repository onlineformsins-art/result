<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Results Portal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- SheetJS library -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <!-- html2pdf library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="background-elements">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <main class="container">
        <header class="header">
            <div class="logo">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>
            <h1>Student Results Portal</h1>
            <p>Enter your Index Number to view your exam results.</p>
        </header>

        <section class="search-section">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="indexInput" placeholder="Enter Index Number (e.g., 1001)" autocomplete="off">
                <button id="searchBtn">Check Result</button>
            </div>
            <div id="statusMessage" class="status-message"></div>
        </section>

        <section id="resultContainer" class="result-section hidden">
            <!-- Results will be injected here via JS -->
        </section>
    </main>

    <footer>
        <p>&copy; <span id="year"></span> Exam Results Portal. All rights reserved.</p>
    </footer>

    <!-- Custom JS -->
    <script src="app.js"></script>
</body>
</html>
