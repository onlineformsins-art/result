<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Results Portal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- SheetJS library -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <!-- html2pdf library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="background-elements">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <main class="container">
        <header class="header">
            <div class="logo">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>
            <h1>Student Results Portal</h1>
            <p>Enter your Index Number to view your exam results.</p>
        </header>

        <section class="search-section">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="indexInput" placeholder="Enter Index Number (e.g., 1001)" autocomplete="off">
                <button id="searchBtn">Check Result</button>
            </div>
            <div id="statusMessage" class="status-message"></div>
        </section>

        <section id="resultContainer" class="result-section hidden">
            <!-- Results will be injected here via JS -->
        </section>
    </main>

    <!-- Hidden PDF Template for clean export -->
    <div id="pdfTemplate" style="display: none; padding: 40px; background: white; color: black; font-family: sans-serif;">
        <div style="text-align: center; border-bottom: 2px solid #000; padding-bottom: 20px; margin-bottom: 30px;">
            <h1 style="margin: 0; font-size: 28px; color: #000;">Official Exam Result Sheet</h1>
        </div>
        
        <div style="margin-bottom: 30px; font-size: 18px;">
            <p style="margin: 5px 0;"><strong>Student Name:</strong> <span id="pdfName"></span></p>
            <p style="margin: 5px 0;"><strong>Index Number:</strong> <span id="pdfIndex"></span></p>
        </div>

        <table style="width: 100%; border-collapse: collapse; margin-bottom: 30px;" id="pdfTable">
            <thead>
                <tr>
                    <th style="border: 1px solid #000; padding: 12px; text-align: left; background-color: #f0f0f0;">Subject</th>
                    <th style="border: 1px solid #000; padding: 12px; text-align: center; background-color: #f0f0f0;">Marks</th>
                </tr>
            </thead>
            <tbody id="pdfTableBody">
                <!-- Subject rows will be injected here -->
            </tbody>
        </table>

        <div id="pdfSummary" style="display: flex; justify-content: space-between; border: 2px solid #000; padding: 20px; font-size: 18px; font-weight: bold; background-color: #f9f9f9;">
            <!-- Summary will be injected here -->
        </div>
    </div>

    <footer>
        <p>&copy; <span id="year"></span> Exam Results Portal. All rights reserved.</p>
    </footer>

    <!-- Custom JS -->
    <script src="app.js"></script>
</body>
</html>
